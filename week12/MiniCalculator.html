<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mini calculator</title>
    <style>
        /* Giao diện màu hồng cho Hà bám sát layout Figure 11.6 */
        body { font-family: 'Segoe UI', Arial; background-color: #fff0f5; padding: 40px; }
        .container { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5); 
            width: 400px; margin: auto; border: 2px solid #ffb6c1; 
        }
        h2 { color: #d81b60; text-align: center; margin-bottom: 20px; }
        td { padding: 8px; color: #555; font-weight: bold; }
        input[type="text"], select { 
            padding: 5px; border: 1px solid #ffc0cb; border-radius: 4px; width: 180px;
        }
        input[type="button"] { 
            padding: 8px 20px; background-color: #ff69b4; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        input[type="button"]:hover { background-color: #d81b60; }
    </style>

    <script language="javascript">
        function calculate() {
            // Khai báo các biến lấy từ form frmCal bám sát ảnh dòng 8-11
            var a = document.frmCal.txta;
            var b = document.frmCal.txtb;
            var o = document.frmCal.slto;
            var r = document.frmCal.txtr;

            // Biểu thức chính quy kiểm tra số (dòng 13)
            var numberFormat = /^[+-]?\d+(\.\d+)?$/;

            // Kiểm tra đầu vào của a (dòng 15-17)
            if (numberFormat.test(a.value) == false) {
                alert("a must be a number!");
                a.focus();
            } 
            // Kiểm tra đầu vào của b (dòng 18-20)
            else if (numberFormat.test(b.value) == false) {
                alert("b must be a number!");
                b.focus();
            }
            // Kiểm tra lỗi chia cho 0 (dòng 22-26)
            else if ((o.value == "/" || o.value == "%") && parseInt(b.value) == 0) {
                alert("b can't be 0!");
                r.value = "";
                b.focus();
            }
            // Thực hiện tính toán bằng hàm eval (dòng 27)
            else {
                r.value = eval(a.value + o.value + b.value);
            }
        }
    </script>
</head>
<body>

    <div class="container">
        <h2>MINI CALCULATOR</h2>
        <form name="frmCal">
            <table border="0" align="center">
                <tr>
                    <td align="right">a = </td>
                    <td><input type="text" name="txta" value="5"></td>
                </tr>
                <tr>
                    <td align="right">b = </td>
                    <td><input type="text" name="txtb" value="2"></td>
                </tr>
                <tr>
                    <td align="right">Operator: </td>
                    <td>
                        <select name="slto">
                            <option value="+">+</option>
                            <option value="-">-</option>
                            <option value="*">*</option>
                            <option value="/">/</option>
                            <option value="%">%</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td align="right">Result: </td>
                    <td><input type="text" name="txtr" readonly style="background:#eee;"></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <br>
                        <input type="button" value="Calculate" onclick="calculate()">
                    </td>
                </tr>
            </table>
        </form>
    </div>

</body>
</html>
